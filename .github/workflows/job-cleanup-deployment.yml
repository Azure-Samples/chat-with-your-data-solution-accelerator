name: Cleanup Deployment Job
on:
  workflow_call:
    inputs:
      runner_os:
        description: 'Runner OS (ubuntu-latest or windows-latest)'
        required: true
        type: string
      trigger_type:
        description: 'Trigger type (workflow_dispatch, pull_request, schedule)'
        required: true
        type: string
      cleanup_resources:
        description: 'Cleanup Deployed Resources'
        required: false
        default: false
        type: boolean
      existing_webapp_url:
        description: 'Existing Container WebApp URL (Skips Deployment)'
        required: false
        default: ''
        type: string
      RESOURCE_GROUP_NAME:
        description: 'Resource Group Name to cleanup'
        required: true
        type: string
      AZURE_LOCATION:
        description: 'Azure Location'
        required: true
        type: string
      AZURE_ENV_OPENAI_LOCATION:
        description: 'Azure OpenAI Location'
        required: true
        type: string
      ENV_NAME:
        description: 'Environment Name'
        required: true
        type: string
      IMAGE_TAG:
        description: 'Docker Image Tag'
        required: true
        type: string
      RESOURCE_TOKEN:
        description: 'Resource Token'
        required: false
        type: string

jobs:
  cleanup-deployment:
    runs-on: ${{ inputs.runner_os }}
    environment: production
    continue-on-error: true
    env:
      RESOURCE_GROUP_NAME: ${{ inputs.RESOURCE_GROUP_NAME }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
      ENV_NAME: ${{ inputs.ENV_NAME }}
      IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
      RESOURCE_TOKEN: ${{ inputs.RESOURCE_TOKEN }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Clean Resources within Resource Group
        id: clean_resources
        if: ${{ inputs.RESOURCE_GROUP_NAME == 'rg-cwyd-ci' }}
        shell: bash
        run: |
          set -e
          echo "🗑️ Cleaning resources in resource group: ${{ env.RESOURCE_GROUP_NAME }}"

          RESOURCE_TOKEN="${{ env.RESOURCE_TOKEN }}"

          if [ -z "$RESOURCE_TOKEN" ]; then
            echo "⚠️ RESOURCE_TOKEN is empty (deployment may have failed before provisioning completed)"
            echo "Falling back to deleting ALL resources in the resource group..."
            RESOURCES=$(az resource list --resource-group "${{ env.RESOURCE_GROUP_NAME }}" --query "[].id" -o tsv)
          else
            # Get all resources in the resource group that contain the RESOURCE_TOKEN in their name
            RESOURCES=$(az resource list --resource-group "${{ env.RESOURCE_GROUP_NAME }}" --query "[?contains(name, '$RESOURCE_TOKEN')].id" -o tsv)
          fi

          if [ -z "$RESOURCES" ]; then
            echo "No resources found in resource group"
          else
            echo "Deleting resources..."
            echo "$RESOURCES" | while read -r resource_id; do
              if [ -n "$resource_id" ]; then
                echo "Deleting: $resource_id"
                az resource delete --ids "$resource_id" --no-wait || echo "Warning: Failed to delete $resource_id"
              fi
            done
          fi

          echo "✅ Resource cleanup initiated (running asynchronously)"
          echo "Note: Resource group ${{ env.RESOURCE_GROUP_NAME }} is preserved"
          if [ -n "$RESOURCE_TOKEN" ]; then
            echo "Note: Only resources with token '$RESOURCE_TOKEN' were targeted for deletion"
          else
            echo "Note: All resources in the resource group were targeted for deletion (no RESOURCE_TOKEN available)"
          fi

      - name: Delete Resource Group
        id: delete_rg
        if: ${{ inputs.RESOURCE_GROUP_NAME != 'rg-cwyd-ci' }}
        shell: bash
        run: |
          set -e
          echo "🗑️ Deleting entire resource group: ${{ env.RESOURCE_GROUP_NAME }}"

          az group delete \
            --name "${{ env.RESOURCE_GROUP_NAME }}" \
            --yes \
            --no-wait

          echo "✅ Resource group deletion initiated (running asynchronously)"
          echo "Note: Resources will be cleaned up in the background"

      - name: Logout from Azure
        if: always()
        shell: bash
        run: |
          azd auth logout || true
          az logout || echo "Warning: Failed to logout from Azure CLI"
          echo "Logged out from Azure."

      - name: Generate Cleanup Job Summary
        if: always()
        shell: bash
        run: |
          echo "## 🧹 Cleanup Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource Group** | \`${{ env.RESOURCE_GROUP_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          # Check if resource cleanup was performed (rg-cwyd-ci)
          if [[ "${{ env.RESOURCE_GROUP_NAME }}" == "rg-cwyd-ci" ]]; then
            echo "| **Cleanup Mode** | Resource Cleanup within RG |" >> $GITHUB_STEP_SUMMARY
            echo "| **Status** | ${{ steps.clean_resources.outcome == 'success' && '✅ Initiated' || (steps.clean_resources.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [[ "${{ steps.clean_resources.outcome }}" == "success" ]]; then
              echo "### ✅ Cleanup Details" >> $GITHUB_STEP_SUMMARY
              echo "- Successfully initiated cleanup of resources within \`${{ env.RESOURCE_GROUP_NAME }}\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ❌ Cleanup Failed" >> $GITHUB_STEP_SUMMARY
              echo "- Resource cleanup process encountered an error" >> $GITHUB_STEP_SUMMARY
              echo "- Check the cleanup-deployment job logs for detailed error information" >> $GITHUB_STEP_SUMMARY
            fi
          else
            # Resource group deletion
            echo "| **Cleanup Mode** | Resource Group Deletion |" >> $GITHUB_STEP_SUMMARY
            echo "| **Status** | ${{ steps.delete_rg.outcome == 'success' && '✅ Initiated' || (steps.delete_rg.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [[ "${{ steps.delete_rg.outcome }}" == "success" ]]; then
              echo "### ✅ Cleanup Details" >> $GITHUB_STEP_SUMMARY
              echo "- Successfully initiated deletion for Resource Group \`${{ env.RESOURCE_GROUP_NAME }}\`" >> $GITHUB_STEP_SUMMARY
            elif [[ "${{ steps.delete_rg.outcome }}" == "skipped" ]]; then
              echo "### ⏭️ Cleanup Skipped" >> $GITHUB_STEP_SUMMARY
              echo "- Resource group deletion was skipped" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ❌ Cleanup Failed" >> $GITHUB_STEP_SUMMARY
              echo "- Cleanup process encountered an error" >> $GITHUB_STEP_SUMMARY
              echo "  - Resource Group: \`${{ env.RESOURCE_GROUP_NAME }}\`" >> $GITHUB_STEP_SUMMARY
              echo "- Check the cleanup-deployment job logs for detailed error information" >> $GITHUB_STEP_SUMMARY
            fi
          fi
