name: v2 backend-only smoke

# Path A router smoke for the backend-only docker compose profile.
# Boots `backend + azurite + postgres` from a clean room (no operator
# `.env`, no Foundry credentials, no mock LLM) and asserts the
# FastAPI app serves all routes -- the literal "backend works without
# functions" claim of `v2/docs/development_plan.md` §3.
#
# Tests live under `v2/tests/smoke/` and are gated by the `smoke`
# pytest marker (registered in `v2/pyproject.toml`). The default
# pytest run excludes them via `addopts = "-m 'not smoke'"`, so the
# main test suite count is unaffected.

on:
  push:
    branches:
      - main
    paths:
      - "v2/src/backend/**"
      - "v2/docker/Dockerfile.backend"
      - "v2/docker/docker-compose.dev.yml"
      - "v2/docker/docker-compose.smoke.yml"
      - "v2/tests/smoke/**"
      - "v2/pyproject.toml"
      - "v2/uv.lock"
      - ".github/workflows/v2-backend-only-smoke.yml"
  pull_request:
    branches:
      - main
    paths:
      - "v2/src/backend/**"
      - "v2/docker/Dockerfile.backend"
      - "v2/docker/docker-compose.dev.yml"
      - "v2/docker/docker-compose.smoke.yml"
      - "v2/tests/smoke/**"
      - "v2/pyproject.toml"
      - "v2/uv.lock"
      - ".github/workflows/v2-backend-only-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv (pins Python via pyproject)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "v2/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Boot backend-only stack
        run: |
          docker compose \
            -f docker/docker-compose.dev.yml \
            -f docker/docker-compose.smoke.yml \
            --profile backend-only \
            up -d --build

      - name: Wait for backend healthcheck
        run: |
          set -e
          # Poll the compose healthcheck (defined on the `backend` service:
          # python urllib hits /api/health every 10s, 6 retries). Cap our
          # wait at 120s so a stuck build fails fast.
          deadline=$((SECONDS + 120))
          while [ $SECONDS -lt $deadline ]; do
            status=$(docker inspect --format='{{.State.Health.Status}}' cwyd-v2-backend 2>/dev/null || echo "missing")
            echo "backend health: $status"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              echo "backend reported unhealthy" >&2
              exit 1
            fi
            sleep 5
          done
          echo "backend did not become healthy within 120s" >&2
          exit 1

      - name: Run smoke tests
        env:
          CWYD_SMOKE_BACKEND_URL: http://localhost:8000
        run: uv run pytest -m smoke tests/smoke/ -v

      - name: Dump backend logs on failure
        if: failure()
        run: |
          docker compose \
            -f docker/docker-compose.dev.yml \
            -f docker/docker-compose.smoke.yml \
            --profile backend-only \
            logs backend

      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f docker/docker-compose.dev.yml \
            -f docker/docker-compose.smoke.yml \
            --profile backend-only \
            down -v
