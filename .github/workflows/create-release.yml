on:
  workflow_run:
    workflows: ["Validate Deployment"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

name: Create-Release

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
