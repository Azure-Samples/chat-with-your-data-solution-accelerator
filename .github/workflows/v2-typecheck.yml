name: v2 typecheck (pyright)

# Q13 (2026-05-05): CI-enforced static type checking for v2.
# Q14e (2026-05-06): hard gate -- `continue-on-error` removed, baseline
# driven from 156 -> 0 (Q14a foundry_iq 47, Q14b postgres 36, Q14c
# cosmosdb 14, Q14d cluster 38, Q14e __init__.py 21).
#
# Runs `uv run pyright` against `src/shared/**` + `src/backend/**`
# (strict mode, configured in `v2/pyproject.toml [tool.pyright]`).
# Any new error fails the workflow; the JSON report is still uploaded
# as a build artifact for reviewers.

on:
  push:
    branches:
      - main
    paths:
      - "v2/src/**/*.py"
      - "v2/pyproject.toml"
      - "v2/uv.lock"
      - ".github/workflows/v2-typecheck.yml"
  pull_request:
    branches:
      - main
    paths:
      - "v2/src/**/*.py"
      - "v2/pyproject.toml"
      - "v2/uv.lock"
      - ".github/workflows/v2-typecheck.yml"
  workflow_dispatch:

jobs:
  pyright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv (pins Python via pyproject)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "v2/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run pyright (hard gate)
        id: pyright
        run: |
          set -e
          uv run pyright --outputjson > pyright-report.json
          # Pretty-print summary for the run log.
          uv run python -c "import json,sys; r=json.load(open('pyright-report.json')); s=r['summary']; print(f\"errors={s['errorCount']} warnings={s['warningCount']} informations={s['informationCount']} files={s['filesAnalyzed']}\")"

      - name: Upload pyright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pyright-report
          path: v2/pyright-report.json
