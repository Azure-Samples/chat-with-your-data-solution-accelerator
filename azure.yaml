# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: chat-with-your-data-solution-accelerator
metadata:
   template: chat-with-your-data-solution-accelerator@1.7.0

requiredVersions:
  azd: '>= 1.18.0 != 1.23.9'

hooks:
  postprovision:
    # run: ./infra/prompt-flow/create-prompt-flow.sh
    posix:
      shell: sh
      run: chmod +x ./scripts/parse_env.sh && ./scripts/parse_env.sh
    windows:
      shell: pwsh
      run: ./scripts/parse_env.ps1
services:
  web:
    project: ./src/frontend
    language: py
    host: appservice
    dist: ./dist
    resourceName: ${SERVICE_WEB_RESOURCE_NAME}
    hooks:
      prepackage:
        windows:
          shell: pwsh
          run: ../../scripts/package_frontend.ps1
          interactive: true
          continueOnError: false
        posix:
          shell: sh
          run: ../../scripts/package_frontend.sh
          interactive: true
          continueOnError: false

  backend:
    project: ./src/backend
    language: py
    host: appservice
    resourceName: ${SERVICE_BACKEND_RESOURCE_NAME}

  adminweb:
    project: ./src/admin
    language: js
    host: appservice
    resourceName: ${SERVICE_ADMINWEB_RESOURCE_NAME}
    hooks:
      prepackage:
        windows:
          shell: pwsh
          run: npm install && npm run build
          continueOnError: false
        posix:
          shell: sh
          run: npm install && npm run build
          continueOnError: false

  function:
    project: ./src/functions
    language: py
    host: function
    resourceName: ${SERVICE_FUNCTION_RESOURCE_NAME}
    hooks:
      prepackage:
        windows:
          shell: pwsh
          run: uv export --no-hashes -o requirements.txt; pip install -r requirements.txt
          continueOnError: false
        posix:
          shell: sh
          run: uv export --no-hashes -o requirements.txt; pip install -r requirements.txt
          continueOnError: false
